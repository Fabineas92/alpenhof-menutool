<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alpenhof – Menükarten Tool</title>

<!-- Externe Bibliotheken: PDF-Export, HTML→Canvas, Excel-Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* =========================================================
   ZENTRALE LAYOUT-KONSTANTEN (nicht verändern ohne Absprache)
   ========================================================= */
:root {
  /* Format = Chefregel: immer 297 x 297 mm */
  --page-size: 297mm;

  /* Typo */
  --font-base: 'Avenir', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif;
  --font-alt:  'Semplicita Pro', 'Semplicita Pro Bold', 'Georgia', serif;

  /* Schriftgrößen in Punkt (fix) */
  --fs-title:    22pt;
  --fs-section:  14pt;
  --fs-body:     11pt;
  --fs-price:    13pt;
  --fs-date:     13pt;

  /* Zeilenhöhen */
  --lh-tight: 1.25;
  --lh-body:  1.35;

  /* Abstände — aus Original-DOCX abgeleitet */
  --gap-lang:    1.5mm; /* Abstand zwischen Sprach-Zeilen */
  --gap-block:   6mm;   /* Abstand zwischen Gang-Blöcken */
  --gap-section: 7mm;   /* Abstand zwischen Sektionen */
  --pad-top:     15.8mm;
  --pad-bottom:  14mm;
  --pad-side:    25.4mm;

  /* Zweispaltiges, aufklappbares Layout (wie Original) */
  --col-gap:     12.5mm;

  /* Farben (Julen/Alpenhof-Palette: warme Creme, Anthrazit, gedämpftes Bergrün) */
  --ink:     #2a2420;
  --ink-2:   #4a4038;
  --muted:   #8a7f74;
  --warn:    #a77a2a;
  --error:   #9a2f22;
  --ok:      #4c6b3b;
  --accent:  #5b6d4e;  /* Bergrün */
  --bg:      #f3ede3;  /* warme Creme */
  --bg-soft: #ebe3d4;
  --card:    #ffffff;
  --border:  #d9cfc0;
  --border-soft: #e8e0d1;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; font-family: var(--font-base); color: var(--ink); background: var(--bg); }

/* ---------- LOCK SCREEN (Template: Tradition-Julen Style) ---------- */
.lock-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.lock-screen.hidden { display: none; }
.lock-bg {
  position: absolute; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 20% 80%, rgba(196,162,101,.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(196,162,101,.06) 0%, transparent 50%),
              linear-gradient(170deg, #0f0d0a 0%, #1a1714 40%, #231f1a 100%);
}
.lock-bg::before {
  content: ''; position: absolute; inset: 0; opacity: .5;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4a265' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.lock-content {
  position: relative; z-index: 1; text-align: center;
  max-width: 400px; padding: 48px 40px; animation: lockFadeIn .8s ease;
}
@keyframes lockFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.lock-logo { width: 120px; height: auto; filter: invert(1); margin-bottom: 12px; opacity: .95; }
.lock-tagline { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: #c4a265; font-weight: 300; margin-bottom: 24px; }
.lock-divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #c4a265, transparent); margin: 0 auto 24px; }
.lock-quote { font-size: 20px; font-weight: 300; font-style: italic; color: #f0e8d8; margin-bottom: 40px; line-height: 1.6; min-height: 52px; transition: opacity .4s ease; }
.lock-form { margin-bottom: 36px; }
.lock-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #6d6050; margin-bottom: 16px; }
.lock-code-inputs { display: flex; justify-content: center; gap: 12px; margin-bottom: 12px; }
.lock-digit {
  width: 52px; height: 60px; background: rgba(255,255,255,.04); border: 1px solid #3a3228;
  border-radius: 8px; color: #f0e8d8; font-size: 24px; text-align: center; outline: none;
  transition: all .2s ease; caret-color: #c4a265;
}
.lock-digit:focus { border-color: #c4a265; background: rgba(196,162,101,.06); box-shadow: 0 0 0 3px rgba(196,162,101,.1); }
.lock-digit.error { border-color: #c45c5c; background: rgba(196,92,92,.08); animation: lockShake .4s ease; }
@keyframes lockShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
}
.lock-error { font-size: 12px; color: #c45c5c; min-height: 18px; margin-bottom: 8px; }
.lock-btn {
  padding: 12px 48px; background: transparent; border: 1px solid #c4a265; color: #c4a265;
  font-size: 15px; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px;
  cursor: pointer; transition: all .25s ease;
}
.lock-btn:hover { background: #c4a265; color: #1a1714; }
.lock-footer { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #3a3228; }

.app { display: grid; }

.app {
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: 100vh;
}

/* ---------- SIDEBAR (Editor) ---------- */
.sidebar {
  background: #fff;
  border-right: 1px solid var(--border);
  padding: 0 0 120px 0;
  overflow-y: auto;
  max-height: 100vh;
}
.sidebar-header {
  padding: 22px 22px 18px;
  border-bottom: 1px solid var(--border-soft);
  background: var(--bg);
  text-align: center;
}
.sidebar-header img.logo { height: 72px; width: auto; display: block; margin: 0 auto 10px; }
.sidebar-header .subtitle {
  font-size: 10px; color: var(--muted); letter-spacing: 4px;
  text-transform: uppercase; margin-top: 2px;
}
.sidebar-header h1 {
  font-size: 16px; margin: 0; letter-spacing: 3px; text-transform: uppercase;
  font-weight: 500; color: var(--ink);
}
.sidebar-body { padding: 18px; }
.sidebar .section {
  border: 1px solid var(--border-soft);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 14px;
  background: #fff;
}
.sidebar h2 {
  font-size: 10px; margin: 0 0 10px 0; text-transform: uppercase;
  letter-spacing: 2.5px; color: var(--muted); font-weight: 600;
  border-bottom: 1px solid var(--border-soft); padding-bottom: 6px;
}

label { display: block; font-size: 12px; color: var(--muted); margin: 6px 0 3px; }
input[type=text], textarea, select {
  width: 100%; padding: 8px; font-size: 13px; font-family: inherit;
  border: 1px solid var(--border); border-radius: 4px; background: #fff; color: var(--ink);
}
textarea { min-height: 60px; resize: vertical; line-height: 1.4; }

.row { display: flex; gap: 8px; }
.row > * { flex: 1; }

.btn {
  display: inline-block; padding: 9px 14px; font-size: 11px; font-weight: 600;
  background: var(--ink); color: #fff; border: none; border-radius: 3px; cursor: pointer;
  transition: background .15s, transform .05s;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.btn:hover { background: #000; }
.btn:active { transform: translateY(1px); }
.btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--border); }
.btn.secondary:hover { background: var(--bg); }
.btn.accent { background: var(--accent); }
.btn.accent:hover { background: #46563c; }
.btn.danger { background: var(--error); }
.btn.small { padding: 5px 9px; font-size: 10px; letter-spacing: 1px; }
.btn.wide { width: 100%; }

.btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

.course { border: 1px dashed var(--border); padding: 10px; border-radius: 4px; margin-bottom: 10px; background: #fff; }
.course .course-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.course .course-head strong { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.alt { border-top: 1px dotted var(--border); padding-top: 8px; margin-top: 8px; }
.alt:first-child { border-top: none; padding-top: 0; margin-top: 0; }

.messages { margin-top: 10px; }
.message { padding: 8px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 4px; border-left: 3px solid; }
.message.warn  { background: #fff8ea; border-color: var(--warn); color: #7a5b1a; }
.message.error { background: #fdeeec; border-color: var(--error); color: #7a1d18; }
.message.ok    { background: #ecf7ef; border-color: var(--ok); color: #155a2a; }

/* ---------- PREVIEW ---------- */
.preview-wrap {
  padding: 28px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg);
}
.preview-tools {
  display: flex; gap: 14px; align-items: center; margin-bottom: 18px; flex-wrap: wrap;
  color: var(--ink); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
}
.preview-tools strong { font-weight: 600; }
.preview-tools .meta { color: var(--muted); font-size: 10px; letter-spacing: 1.5px; }
.preview-tools .zoom { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; }
.preview-tools input[type=range] { width: 120px; accent-color: var(--accent); }

/* 297×297mm Karte – zweispaltig, aufklappbar (wie Original-DOCX). */
#menu-frame {
  width: var(--page-size);
  height: var(--page-size);
  background: var(--card);
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
  border: 1px solid var(--border);
  padding: var(--pad-top) var(--pad-side) var(--pad-bottom);
  font-family: var(--font-base);
  color: var(--ink);
  transform-origin: top left;
  overflow: hidden;     /* Überlauf wird erkannt, aber abgeschnitten */
  position: relative;
}

/* Falzlinie in der Mitte (nur visuelle Hilfe, nicht im Druck) */
#menu-frame::after {
  content: '';
  position: absolute; top: 0; bottom: 0; left: 50%;
  width: 0; border-left: 1px dashed rgba(0,0,0,.08);
  pointer-events: none;
}

#menu-frame.font-semplicita {
  --font-base: 'Semplicita Pro', 'Semplicita Pro Bold', 'Georgia', serif;
  font-family: var(--font-base);
}

/* Sprachstile — technisch so implementiert, dass sie nicht vertauscht werden können */
.lang-de { font-style: normal; font-weight: 400; }
.lang-fr { font-style: italic;  font-weight: 400; }
.lang-en { font-style: normal; font-weight: 700; }

/* Zwei feste Seiten (aufklappbar, Falz in der Mitte) — wie Original-Foto */
.menu-inner {
  height: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--col-gap);
}
.menu-page {
  display: flex; flex-direction: column;
  height: 100%;
  text-align: left;
}
.menu-page.left  { padding-right: 4mm; }
.menu-page.right { padding-left: 4mm; }

/* Titel (Begrüßung) — linksbündig, fett */
.menu-title {
  font-size: var(--fs-section);
  font-weight: 700;
  margin-bottom: 4mm;
  letter-spacing: .3px;
}
.menu-title .sep { margin: 0 .25em; }
/* Der Titel nutzt einheitliche schwarze Schrift (wie im Foto),
   Sprachstile werden trotzdem weitergegeben für Konsistenz. */
.menu-title .lang-de { font-weight: 700; }
.menu-title .lang-fr { font-weight: 700; font-style: normal; }
.menu-title .lang-en { font-weight: 700; }

/* Welcome-Block: 3 Absätze übereinander, mit Leerraum dazwischen */
.welcome-block { margin-bottom: var(--gap-section); }
.welcome-block p {
  margin: 0 0 1.2mm 0;
  font-size: var(--fs-body);
  line-height: var(--lh-body);
}
.welcome-block .lang-group { margin-bottom: 3.5mm; }

/* Weinempfehlung – linksbündig, unten auf der linken Seite */
.wine-section { margin-top: auto; }
.wine-section .section-head {
  font-size: var(--fs-body); font-weight: 700;
  margin-bottom: 5mm;
}
.wine-section .section-head .sep { margin: 0 .25em; }
.wine-list .wine {
  display: grid; grid-template-columns: 1fr auto;
  align-items: baseline;
  margin-bottom: 4mm;
  font-size: var(--fs-body);
  line-height: var(--lh-body);
}
.wine-list .wine .wine-name  { font-weight: 700; }
.wine-list .wine .wine-price { font-weight: 700; padding-left: 6mm; }
.wine-list .wine .wine-info  { grid-column: 1 / -1; font-weight: 400; }

/* Datum (Kopf der rechten Seite) */
.menu-date {
  font-size: var(--fs-body);
  font-weight: 700;
  margin-bottom: 5mm;
}

/* Gänge – linksbündig, kompakt */
.courses { display: flex; flex-direction: column; }
.course-block {
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  margin-bottom: 3mm;
}
.course-block .alt-row > div { margin-bottom: 0; }
.course-block .alt-row + .alt-sep { margin-top: 2mm; }

/* Einzeilige Multi-Sprach-Zeile (z. B. "Salat Buffet - Buffet de salades - Salad buffet") */
.course-block.inline .alt-row {
  display: block;
}
.course-block.inline .alt-row .lang-de,
.course-block.inline .alt-row .lang-fr,
.course-block.inline .alt-row .lang-en { display: inline; }
.course-block.inline .alt-row .sep { margin: 0 .35em; }

.course-sep { margin: 3mm 0; letter-spacing: 3px; }
.alt-sep { margin: 1.5mm 0; font-size: var(--fs-body); font-weight: 700; }

/* Preise – unten auf der rechten Seite, Zeile mit CHF rechts */
.menu-prices { margin-top: auto; padding-top: 6mm; }
.menu-prices .price-line {
  display: grid; grid-template-columns: 1fr auto;
  align-items: baseline;
  font-size: var(--fs-body);
  font-weight: 700;
  margin-bottom: 1mm;
}
.menu-prices .price-amount { padding-left: 6mm; }

/* Warnungs-Badge im Preview */
#overflow-badge {
  position: absolute; bottom: 8mm; right: 8mm;
  background: var(--error); color: #fff; padding: 3mm 5mm; font-size: 10pt;
  border-radius: 3mm; display: none;
}
#overflow-badge.visible { display: block; }

/* Font-Ladestatus */
.font-status { font-size: 11px; color: var(--muted); margin-top: 4px; }
.font-status .missing { color: var(--warn); }

/* Toolbar-Links */
.toolbar-top {
  background: #1b1b1b; color: #fff;
  padding: 10px 18px; display: flex; justify-content: space-between; align-items: center;
  grid-column: 1 / -1;
  font-size: 13px;
}
.toolbar-top .brand { font-weight: 700; letter-spacing: 2px; }
.toolbar-top .meta { color: #bbb; font-size: 11px; }
</style>

</head>
<body>

<!-- Lock-Screen (Tradition-Julen Template) -->
<div id="lock-screen" class="lock-screen">
  <div class="lock-bg"></div>
  <div class="lock-content">
    <img src="assets/logo.svg" alt="Tradition Julen" class="lock-logo">
    <p class="lock-tagline">Seit 1910</p>
    <div class="lock-divider"></div>
    <p class="lock-quote" id="lock-quote">Natur, Genuss &amp; Wellness</p>
    <div class="lock-form">
      <p class="lock-label">Mitarbeiter-Zugang</p>
      <div class="lock-code-inputs">
        <input type="password" maxlength="1" class="lock-digit" data-idx="0" inputmode="numeric" autofocus>
        <input type="password" maxlength="1" class="lock-digit" data-idx="1" inputmode="numeric">
        <input type="password" maxlength="1" class="lock-digit" data-idx="2" inputmode="numeric">
        <input type="password" maxlength="1" class="lock-digit" data-idx="3" inputmode="numeric">
      </div>
      <p class="lock-error" id="lock-error"></p>
      <button id="lock-submit" class="lock-btn">Eintreten</button>
    </div>
    <p class="lock-footer">Alpenhof · Menükarten-Tool</p>
  </div>
</div>

<div id="app" class="app" style="display:none;">
  <!-- =========== SIDEBAR / EDITOR =========== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/logo.svg" alt="Tradition Julen" class="logo" />
      <h1>Alpenhof</h1>
      <div class="subtitle">Menükarten-Tool</div>
    </div>
    <div class="sidebar-body">

    <!-- Schriftart + Globale Aktionen -->
    <div class="section">
      <h2>Schriftart & Aktionen</h2>
      <label>Schriftart</label>
      <select id="font-select">
        <option value="avenir">Avenir</option>
        <option value="semplicita">Semplicita Pro Bold</option>
      </select>
      <div class="font-status" id="font-status"></div>

      <div class="btn-row" style="margin-top: 12px;">
        <button class="btn secondary" onclick="checkSpelling()">Rechtschreibung prüfen</button>
        <button class="btn secondary" onclick="translateAll()">Übersetzen</button>
      </div>
      <div class="btn-row">
        <button class="btn wide" onclick="checkAll()">Alles prüfen &amp; übersetzen</button>
      </div>
      <div class="btn-row">
        <button class="btn secondary" onclick="exportPDF()">PDF Export</button>
        <button class="btn secondary" onclick="exportExcel()">Excel Export</button>
      </div>
      <div class="btn-row">
        <button class="btn secondary small" onclick="loadExample()">Beispiel laden</button>
        <button class="btn secondary small" onclick="clearAll()">Alles leeren</button>
      </div>
    </div>

    <!-- Begrüßung -->
    <div class="section">
      <h2>Begrüßung</h2>
      <label>Titel (DE)</label>
      <input type="text" id="title-de" value="WILLKOMMEN" />

      <label>Text (DE, mehrere Absätze mit Leerzeile trennen)</label>
      <textarea id="welcome-de" rows="6"></textarea>
    </div>

    <!-- Weinempfehlung -->
    <div class="section">
      <h2>Weinempfehlung</h2>
      <label>Überschrift (DE)</label>
      <input type="text" id="wine-title-de" value="Weinempfehlung" />

      <div id="wine-list"></div>
      <div class="btn-row">
        <button class="btn secondary small" onclick="addWine()">+ Wein hinzufügen</button>
      </div>
    </div>

    <!-- Datum -->
    <div class="section">
      <h2>Datum</h2>
      <input type="text" id="date-de" placeholder="z.B. Freitag 17. April 2026" />
    </div>

    <!-- Gänge -->
    <div class="section">
      <h2>Gänge</h2>
      <div id="courses"></div>
      <div class="btn-row">
        <button class="btn secondary small" onclick="addCourse()">+ Gang hinzufügen</button>
      </div>
    </div>

    <!-- Preise -->
    <div class="section">
      <h2>Preise</h2>
      <div id="prices"></div>
      <div class="btn-row">
        <button class="btn secondary small" onclick="addPrice()">+ Preiszeile</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>
    </div><!-- /sidebar-body -->
  </aside>

  <!-- =========== PREVIEW =========== -->
  <section class="preview-wrap">
    <div class="preview-tools">
      <strong>Vorschau</strong>
      <span class="meta" style="color:var(--muted); font-size:12px;">Format: 297 × 297 mm (fix)</span>
      <div class="zoom">
        Zoom
        <input type="range" id="zoom" min="20" max="100" value="45" />
        <span id="zoom-val">45%</span>
      </div>
    </div>

    <div id="menu-scaler">
      <div id="menu-frame" class="font-avenir">
        <div class="menu-inner" id="menu-inner"></div>
        <div id="overflow-badge">Textüberlauf – Inhalt kürzen</div>
      </div>
    </div>
  </section>
</div>

<script>
/* =========================================================
   LOCK-SCREEN (4-Digit, rotierende Zitate)
   Client-seitiger Schutz. Session-basiert (pro Tab/Browser).
   ========================================================= */
(function () {
  'use strict';
  const CORRECT_CODE = '3920';
  const SESSION_KEY  = 'alpenhof_auth';
  const QUOTES = [
    'Natur, Genuss & Wellness',
    'Traditionell, Authentisch & Informell',
    'Einzigartig, Entspannend & Atemberaubend'
  ];

  function initLockScreen() {
    const lockScreen = document.getElementById('lock-screen');
    if (!lockScreen) return;

    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      unlock(true);
      return;
    }

    // Zitate rotieren
    let quoteIdx = 0;
    const quoteEl = document.getElementById('lock-quote');
    if (quoteEl && QUOTES.length > 1) {
      setInterval(() => {
        quoteIdx = (quoteIdx + 1) % QUOTES.length;
        quoteEl.style.opacity = '0';
        setTimeout(() => {
          quoteEl.textContent = QUOTES[quoteIdx];
          quoteEl.style.opacity = '1';
        }, 400);
      }, 4000);
    }

    const digits = document.querySelectorAll('.lock-digit');
    digits.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        document.getElementById('lock-error').textContent = '';
        if (input.value.length === 1 && i < digits.length - 1) digits[i + 1].focus();
        const code = [...digits].map(d => d.value).join('');
        if (code.length === 4) setTimeout(() => checkCode(digits), 100);
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value === '' && i > 0) {
          digits[i - 1].focus();
          digits[i - 1].value = '';
        }
        if (e.key === 'Enter') checkCode(digits);
      });
      input.addEventListener('keypress', (e) => {
        if (!/[0-9]/.test(e.key)) e.preventDefault();
      });
    });

    document.getElementById('lock-submit').addEventListener('click', () => checkCode(digits));
    setTimeout(() => digits[0].focus(), 150);
  }

  function checkCode(digits) {
    const code = [...digits].map(d => d.value).join('');
    if (code === CORRECT_CODE) {
      sessionStorage.setItem(SESSION_KEY, '1');
      digits.forEach(d => {
        d.style.borderColor = '#7dab6e';
        d.style.background  = 'rgba(125,171,110,.15)';
      });
      setTimeout(() => unlock(false), 400);
    } else {
      digits.forEach(d => { d.classList.add('error'); d.value = ''; });
      document.getElementById('lock-error').textContent = 'Falscher Code';
      digits[0].focus();
      setTimeout(() => digits.forEach(d => d.classList.remove('error')), 600);
    }
  }

  function unlock(instant) {
    const lockScreen = document.getElementById('lock-screen');
    const app = document.getElementById('app');
    if (instant) {
      lockScreen.classList.add('hidden');
      app.style.display = 'grid';
      return;
    }
    lockScreen.style.transition = 'opacity .5s ease';
    lockScreen.style.opacity = '0';
    setTimeout(() => {
      lockScreen.classList.add('hidden');
      app.style.display = 'grid';
    }, 500);
  }

  document.addEventListener('DOMContentLoaded', initLockScreen);
})();

/* =========================================================
   LOKALES WÖRTERBUCH: schnelle, restaurant-taugliche
   Übersetzungen für typische Begriffe.
   Fallback-Übersetzung, bevor wir die Online-API bemühen.
   ========================================================= */
const DICT_FR = {
  'willkommen': 'bienvenue',
  'weinempfehlung': 'propositions de vins',
  'oder': 'ou',
  'käse': 'fromage',
  'käseteller': 'assiette de fromages',
  'salat buffet': 'buffet de salades',
  '5 gänge': '5 plats',
  '2 gänge': '2 plats',
  '3 gänge': '3 plats',
  '4 gänge': '4 plats'
};
const DICT_EN = {
  'willkommen': 'welcome',
  'weinempfehlung': 'wine recommendation',
  'oder': 'or',
  'käse': 'cheese',
  'käseteller': 'cheese plate',
  'salat buffet': 'salad buffet',
  '5 gänge': '5 courses',
  '2 gänge': '2 courses',
  '3 gänge': '3 courses',
  '4 gänge': '4 courses'
};

/* =========================================================
   ÜBERSETZUNG – MyMemory API (kostenlos, ohne Key)
   Fällt auf leeren String zurück, wenn offline.
   ========================================================= */
async function translateText(text, targetLang) {
  if (!text || !text.trim()) return '';

  // Erst lokales Wörterbuch (einzelne Zeilen exakt)
  const low = text.trim().toLowerCase();
  if (targetLang === 'fr' && DICT_FR[low]) return capitalizeLike(text, DICT_FR[low]);
  if (targetLang === 'en' && DICT_EN[low]) return capitalizeLike(text, DICT_EN[low]);

  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=de|${targetLang}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Translate API fehler');
    const data = await res.json();
    const translated = data?.responseData?.translatedText || '';
    return translated;
  } catch (err) {
    console.warn('Translation fallback for:', text, err);
    return '';
  }
}

/* Übernimmt Gross-/Klein-Schreibung des Originals in die Übersetzung */
function capitalizeLike(original, translated) {
  if (original === original.toUpperCase()) return translated.toUpperCase();
  if (original[0] && original[0] === original[0].toUpperCase())
    return translated[0].toUpperCase() + translated.slice(1);
  return translated;
}

/* =========================================================
   RECHTSCHREIBUNG – LanguageTool API (kostenlos, ohne Key)
   ========================================================= */
async function spellCheckDE(text) {
  if (!text || !text.trim()) return [];
  try {
    const body = new URLSearchParams();
    body.set('text', text);
    body.set('language', 'de-DE');
    const res = await fetch('https://api.languagetool.org/v2/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });
    if (!res.ok) throw new Error('LT Fehler');
    const data = await res.json();
    return data.matches || [];
  } catch (err) {
    console.warn('Spellcheck offline:', err);
    return null;
  }
}

/* =========================================================
   MESSAGES / VALIDIERUNG
   ========================================================= */
function showMessages(msgs) {
  const box = document.getElementById('messages');
  box.innerHTML = msgs.map(m =>
    `<div class="message ${m.type}">${escapeHtml(m.text)}</div>`
  ).join('');
}
function pushMsg(arr, type, text) { arr.push({ type, text }); }

function validateFormat() {
  const msgs = [];
  // Reihenfolge ist strukturell garantiert (de,fr,en in jedem Block).
  // Wir prüfen aber: Sind alle Übersetzungen vorhanden?
  if (state.title.de && (!state.title.fr || !state.title.en))
    pushMsg(msgs, 'warn', 'Titel: FR/EN-Übersetzung fehlt.');

  const wd = state.welcome.de.trim(), wf = state.welcome.fr.trim(), we = state.welcome.en.trim();
  if (wd && (!wf || !we)) pushMsg(msgs, 'warn', 'Begrüßungstext: FR/EN-Übersetzung fehlt.');

  state.courses.forEach((c, ci) => {
    c.alts.forEach((a, ai) => {
      if (a.de && (!a.fr || !a.en))
        pushMsg(msgs, 'warn', `Gang ${ci+1}, Alternative ${ai+1}: FR/EN-Übersetzung fehlt.`);
    });
  });

  state.wines.forEach((w, i) => {
    if (w.de.name && (!w.fr.name || !w.en.name))
      pushMsg(msgs, 'warn', `Wein ${i+1}: FR/EN-Name fehlt.`);
  });

  // Formatprüfung: Overflow pro Seite
  const pages = document.querySelectorAll('#menu-inner .menu-page');
  pages.forEach((p, idx) => {
    if (p.scrollHeight > p.clientHeight + 2) {
      pushMsg(msgs, 'error', `Textüberlauf auf ${idx === 0 ? 'linker' : 'rechter'} Seite. Inhalt kürzen.`);
    }
  });

  // Schriftschnitt-Check (paranoid): Stellt sicher, dass CSS-Klassen existieren
  ['lang-de','lang-fr','lang-en'].forEach(cls => {
    const el = document.querySelector('.' + cls);
    if (!el) return;
    const cs = getComputedStyle(el);
    const expect = LAYOUT.styleMap[cls.split('-')[1]];
    const weight = parseInt(cs.fontWeight, 10) || 400;
    const style = cs.fontStyle;
    let ok = true;
    if (expect === 'regular' && (weight >= 600 || style === 'italic')) ok = false;
    if (expect === 'italic'  && style !== 'italic') ok = false;
    if (expect === 'bold'    && weight < 600) ok = false;
    if (!ok) pushMsg(msgs, 'error', `Schriftschnitt für ${cls} weicht ab (erwartet: ${expect}).`);
  });

  return msgs;
}

async function translateAll() {
  showMessages([{ type: 'ok', text: 'Übersetze...' }]);

  // Titel
  if (state.title.de) {
    state.title.fr = state.title.fr || await translateText(state.title.de, 'fr');
    state.title.en = state.title.en || await translateText(state.title.de, 'en');
  }

  // Welcome: Absatzweise
  state.welcome.fr = state.welcome.de ? await translateMulti(state.welcome.de, 'fr') : '';
  state.welcome.en = state.welcome.de ? await translateMulti(state.welcome.de, 'en') : '';

  // Wine title
  if (state.wineTitle.de) {
    state.wineTitle.fr = await translateText(state.wineTitle.de, 'fr');
    state.wineTitle.en = await translateText(state.wineTitle.de, 'en');
  }

  // Weine (Name + Info, aber Zahlen behalten wir bei)
  for (const w of state.wines) {
    if (w.de.name) {
      w.fr.name = await translateText(w.de.name, 'fr');
      w.en.name = await translateText(w.de.name, 'en');
    }
    w.fr.info = w.de.info; // Preis/Herkunft identisch
    w.en.info = w.de.info;
  }

  // Datum: bleibt typischerweise gleich bzw. wird übersetzt
  if (state.date.de) {
    state.date.fr = await translateText(state.date.de, 'fr');
    state.date.en = await translateText(state.date.de, 'en');
  }

  // Gänge
  for (const c of state.courses) {
    for (const a of c.alts) {
      if (a.de) {
        a.fr = await translateText(a.de, 'fr');
        a.en = await translateText(a.de, 'en');
      }
    }
  }

  renderPreview();
  showMessages([{ type: 'ok', text: 'Übersetzung abgeschlossen. Bitte prüfen – FR/EN können manuell nachjustiert werden im Code/State.' }]);
}

async function translateMulti(text, lang) {
  const paragraphs = text.split(/\n\s*\n/);
  const out = [];
  for (const p of paragraphs) {
    out.push(await translateText(p, lang));
  }
  return out.join('\n\n');
}

async function checkSpelling() {
  const texts = [];
  if (state.welcome.de) texts.push({ label: 'Begrüßungstext', text: state.welcome.de });
  state.courses.forEach((c, ci) => c.alts.forEach((a, ai) => {
    if (a.de) texts.push({ label: `Gang ${ci+1}, Alt. ${ai+1}`, text: a.de });
  }));

  if (!texts.length) {
    showMessages([{ type: 'warn', text: 'Keine deutschen Texte zum Prüfen.' }]);
    return;
  }

  showMessages([{ type: 'ok', text: 'Prüfe Rechtschreibung...' }]);
  const results = [];
  for (const t of texts) {
    const matches = await spellCheckDE(t.text);
    if (matches === null) {
      results.push({ type: 'warn', text: `${t.label}: Rechtschreibprüfung offline (LanguageTool nicht erreichbar).` });
      continue;
    }
    if (matches.length) {
      matches.slice(0, 5).forEach(m => {
        const snippet = t.text.substr(m.offset, m.length);
        const sug = (m.replacements || []).slice(0, 3).map(r => r.value).join(', ');
        results.push({ type: 'warn', text: `${t.label}: «${snippet}» – ${m.message}${sug ? ' → '+sug : ''}` });
      });
    }
  }
  if (!results.length) results.push({ type: 'ok', text: 'Keine Rechtschreibfehler gefunden.' });
  showMessages(results);
}

async function checkAll() {
  await checkSpelling();
  const spellMsgs = Array.from(document.querySelectorAll('#messages .message'))
    .map(el => ({ type: [...el.classList].find(c => c!=='message'), text: el.textContent }));

  await translateAll();
  const formatMsgs = validateFormat();
  if (!formatMsgs.length) formatMsgs.push({ type: 'ok', text: 'Layout ok. Keine Fehler.' });

  showMessages([...spellMsgs, ...formatMsgs]);
}

  state.prices.forEach((p, i) => rows.push([`Preis ${i+1}`, p, p, p]));

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 20 }, { wch: 55 }, { wch: 55 }, { wch: 55 }];

  // Formatierungs-Hinweis in Zellen (Excel unterstützt zellweise Stile über xlsx.js-style in free nicht vollständig,
  // darum markieren wir die Stile in der Kopfzeile.)
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Menukarte');
  const fname = `alpenhof-menu-${(state.date.de || 'entwurf').replace(/[^a-z0-9]+/gi, '-').toLowerCase()}.xlsx`;
  XLSX.writeFile(wb, fname);
  showMessages([{ type: 'ok', text: 'Excel gespeichert: ' + fname }]);
}

/* =========================================================
   UTILITIES
   ========================================================= */
/* Rendert Text in mehrere <p>-Absätze (nach Zeilenumbrüchen) mit Sprach-Klasse */
function renderParagraphs(text, lang) {
  if (!text) return '';
  return text.split(/\n\s*\n|\n/).filter(l => l.trim().length).map(p =>
    `<p class="lang-${lang}">${escapeHtml(p)}</p>`
  ).join('');
}

/* Trennt Wein-Info in Preis (Zahl am Anfang) + Herkunft (Rest) */
function splitWinePrice(info) {
  if (!info) return { price: '', origin: '' };
  const m = /^\s*([\d.,]+)\s*[–\-—]?\s*(.*)$/.exec(info);
  if (m) return { price: m[1], origin: m[2].trim() };
  return { price: '', origin: info };
}

/* Trennt Preis-Zeile ("5 Gänge / 5 Plats / 5 Courses     CHF 78")
   in Text + CHF-Betrag (für right-aligned CHF-Spalte) */
function splitPriceLine(line) {
  const m = /^(.*?)(CHF\s*[\d.,]+|\d+\.?\d*\s*CHF|€\s*[\d.,]+)\s*$/i.exec(line);
  if (m) return { text: m[1].trim(), price: m[2].trim() };
  return { text: line, price: '' };
}

function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/\n/g, '<br>');
}
function escapeAttr(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}
function mmToPx(mm) { return mm * 3.7795275591; }

/* Zoom-Steuerung für Bildschirm-Vorschau */
function applyZoom() {
  const z = document.getElementById('zoom').value;
  document.getElementById('zoom-val').textContent = z + '%';
  const frame = document.getElementById('menu-frame');
  frame.style.transform = `scale(${z/100})`;
  const scaler = document.getElementById('menu-scaler');
  // Container-Größe an skalierte Karte anpassen, damit der Scrollbereich passt
  scaler.style.width  = (297 * 3.7795275591 * (z/100)) + 'px';
  scaler.style.height = (297 * 3.7795275591 * (z/100)) + 'px';
}

/* Schriftarten-Verfügbarkeit prüfen (Best-effort via FontFace) */
async function checkFonts() {
  const status = document.getElementById('font-status');
  const results = [];
  // Avenir ist auf macOS meist vorhanden
  const avenirOk = document.fonts && document.fonts.check('12px Avenir');
  // Semplicita Pro ist meist NICHT vorhanden
  const sempOk = document.fonts && document.fonts.check('12px "Semplicita Pro"');
  results.push(avenirOk ? 'Avenir: verfügbar' : '<span class="missing">Avenir: fällt auf Helvetica/Arial zurück</span>');
  results.push(sempOk ? 'Semplicita Pro: verfügbar' : '<span class="missing">Semplicita Pro: fällt auf Georgia zurück</span>');
  status.innerHTML = results.join(' · ');
}
